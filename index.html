<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="player-shell">
      <section class="player-card" aria-label="Music player">
        <div class="art-frame">
          <img
            id="cover"
            src="img/jacinto-1.jpg"
            alt="Album art for Electric Chill Machine"
          />
        </div>

        <div class="track-meta">
          <span class="track-tag">Now playing</span>
          <h1 id="title">Electric Chill Machine</h1>
          <p id="artist">Jacinto Design</p>
        </div>

        <audio id="audio" src="music/jacinto-1.mp3"></audio>

        <div class="progress-group">
          <div
            class="progress-container"
            id="progress-container"
            aria-label="Track progress"
          >
            <div class="progress-track"></div>
            <div class="progress-bar" id="progress"></div>
          </div>
          <div class="time-labels">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button
            class="control-btn"
            id="prev"
            type="button"
            aria-label="Previous track"
          >
            <i class="fas fa-backward"></i>
          </button>
          <button
            class="control-btn primary"
            id="play"
            type="button"
            aria-label="Play"
          >
            <i class="fas fa-play"></i>
          </button>
          <button
            class="control-btn"
            id="next"
            type="button"
            aria-label="Next track"
          >
            <i class="fas fa-forward"></i>
          </button>
        </div>

        <div class="footer-panel">
          <span id="track-count">1 / 4</span>
          <span id="track-title">Electric Chill Machine</span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
